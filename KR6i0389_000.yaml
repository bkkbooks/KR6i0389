front:
  text: 造塔功德經序夫塔者梵之稱譯者謂之墳或方或圓厥製多緒乍琢乍璞文質異宜並以封樹遺靈扃鈐法藏冀表河砂之德庶酬塵劫之勞豈伊弓劍衣冠言申永慕禹陵孔壁用顯緘藏而已哉將有量等大千覆三界而高梵世取均菴果偶棗葉而譬針鋒洪纖兩途福應無二大小千計淨心終一何只黃金白玉架逈爭暉火齊水精浮空競彩夕振祥飈之響入鏤鐸以流清晨霏仙露之甘上雕盤以凝泫至乃位隆三果勳重四禪高升有頂之宮行屆無災之地斯教之弘旨也此經以永隆元年冬十一月十五日請天竺法師地婆訶羅與西明寺沙門圓測等五人於弘福道場奉詔宣譯至其年十二月八日終其文義庶斯法寶周給大千俾彼慧燈照融三界云爾
