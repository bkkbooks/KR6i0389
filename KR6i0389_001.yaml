body:
  text: 大唐中天竺三藏法師地婆訶羅唐言日照譯如是我聞一時佛在忉利天宮白玉座上與大比丘大菩薩等及彼天主無量眾俱時大梵天王那羅延天大自在天及五乾闥婆王等各與眷屬俱來至佛所欲問如來造塔之法及塔所生功德之量會中有菩薩名觀世音知其意即從座起偏袒右肩右膝著地合掌向佛而作是言世尊今此諸天乾闥婆等故來至此欲請如來造塔之法及塔所生功德之量唯願世尊為彼解說利益一切無量眾生爾時世尊告觀世音菩薩言善男子若此現在諸天眾等及未來世一切眾生隨所在方未有塔處能於其中建立之者其狀高妙出過三界乃至至小如菴羅果所有表剎上至梵天乃至至小猶如針等所有輪蓋覆彼大千乃至至小猶如棗葉於彼塔內藏掩如來所有舍利髮牙髭爪下至一分或置如來所有法藏十二部經下至於一四句偈其人功德如彼梵天命終之後生於梵世於彼壽盡生五淨居與彼諸天等無有異善男子如我所說如是之事是彼塔量功德因緣汝諸天等應當修學爾時觀世音菩薩復白佛言世尊如向所說安置舍利及以法藏我已受持不審如來四句之義唯願為我分別演說爾時世尊說是偈言諸法因緣生我說是因緣因緣盡故滅我作如是說善男子如是偈義名佛法身汝當書寫置彼塔內何以故一切因緣及所生法性空寂故是故我說名為法身若有眾生解了如是因緣之義當知是人即為見佛爾時觀世音菩薩及彼諸天一切大眾乾闥婆等聞佛所說皆大歡喜信受奉行
